<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store">
<title>LSE GALLERY — admin2 (프로토타입)</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font:24px/1.5 -apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#0f0f11;color:#eceae4}
  /* top toolbar — 가로 스크롤 허용(폭 초과해도 안 깨짐), 저장은 별도 FAB */
  #bar{position:fixed;top:0;left:0;right:0;height:60px;z-index:10;display:flex;align-items:center;gap:8px;padding:0 12px;
       background:rgba(15,15,17,.96);backdrop-filter:blur(8px);border-bottom:1px solid #2a2c33;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  #bar::-webkit-scrollbar{display:none}
  #bar b{font-size:15px;letter-spacing:.04em;white-space:nowrap;flex:none}
  #bar b span{color:#8a8c94;font-weight:400}
  #bar .btn{flex:none;font-size:18px;padding:9px 13px;border-radius:9px}
  .btn{border:1px solid #2a2c33;background:#17181c;color:#eceae4;padding:12px 18px;border-radius:10px;font-size:22px;cursor:pointer;
       display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;line-height:1.2}
  .btn:hover{border-color:#4a4d57}
  .btn.primary{background:#e85c4a;border-color:#e85c4a;color:#fff;font-weight:600}
  .btn.on{background:#3fb56b;border-color:#3fb56b;color:#08130c;font-weight:700}
  .btn.danger{border-color:#7a2f2a;color:#f0a99f}
  .btn.sm{padding:10px 15px;font-size:19px}
  #status{font-size:16px;color:#8a8c94;margin-left:auto;white-space:nowrap;flex:none;padding-left:6px}
  #status.ok{color:#3fb56b} #status.err{color:#e85c4a}
  #frame{position:fixed;top:60px;left:0;right:0;bottom:0;width:100%;height:calc(100% - 60px);border:0;background:#fff}
  #panel,#apanel{position:fixed;top:60px;right:0;bottom:0;width:min(520px,96vw);z-index:9;background:#141519;border-left:1px solid #2a2c33;
         transform:translateX(102%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-x:hidden;overflow-y:auto;overscroll-behavior:contain}
  #panel.open,#apanel.open{transform:none}
  /* 제목+닫기 헤더 상시 고정 (음수마진 없이 full-width → 우측 잘림 없음) */
  .phead{position:sticky;top:0;z-index:6;background:#141519;display:flex;align-items:center;gap:8px;padding:16px 18px;border-bottom:1px solid #2a2c33}
  .pbody{padding:16px 18px 22px;display:flex;flex-direction:column;gap:16px;min-width:0}
  .pbody>*{min-width:0;max-width:100%}
  /* about block editor */
  .addb{background:#e85c4a;border-color:#e85c4a;color:#fff;font-weight:600}
  .ablk{background:#0a0b0e;border:1px solid #2a2c33;border-radius:10px;overflow:hidden}
  .ablk__h{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#191b20;border-bottom:1px solid #2a2c33}
  .ablk__h .btag{font-size:20px;font-weight:700;color:#e85c4a}
  .ablk__h .sp{flex:1}
  .ablk__h button{width:48px;height:42px;padding:0;font-size:19px;flex:none}
  .ablk__h button.del{width:auto;padding:0 14px;color:#f0a99f;border-color:#7a2f2a}
  .ablk__h button:disabled{opacity:.3}
  .ablk__b{padding:12px;display:flex;flex-direction:column;gap:12px}
  .af label{display:block;font-size:18px;color:#a6a8ae;margin-bottom:5px}
  .af input,.af select,.af textarea{width:100%;background:#0a0b0e;border:1px solid #484d59;color:#eceae4;border-radius:8px;padding:12px 13px;font:inherit}
  .af textarea{min-height:96px;resize:vertical}
  .af-row{display:flex;gap:8px}.af-row>.af{flex:1}
  .aitem{display:flex;gap:8px;align-items:flex-start;background:#141519;border:1px solid #2a2c33;border-radius:8px;padding:10px;margin-top:8px}
  .aitem .fields{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
  .aitem .rm{width:44px;height:44px;padding:0;flex:none}
  .acover{position:relative;width:100%;aspect-ratio:16/9;background:#000;border:1px dashed #484d59;border-radius:8px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#eceae4;font-weight:600}
  .acover img{width:100%;height:100%;object-fit:contain;background:#000}
  .phead h2{font-size:23px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .phead h2 span{color:#8a8c94;font-weight:400;font-size:17px}
  .field label{display:block;font-size:20px;color:#a6a8ae;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;background:#0a0b0e;border:1px solid #484d59;color:#eceae4;border-radius:9px;padding:13px 14px;font:inherit;resize:vertical}
  .field textarea{min-height:150px}
  .field .datesel{display:flex;gap:8px}.field .datesel select{flex:1}
  .cover{position:relative;width:100%;aspect-ratio:4/3;background:#0a0b0e;border:1px dashed #484d59;border-radius:8px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cover img{width:100%;height:100%;object-fit:cover;display:none}
  .cover.has img{display:block}
  .cover .empty{color:#eceae4;font-weight:600;font-size:20px;background:rgba(255,255,255,.06);border:1px solid #484d59;padding:12px 18px;border-radius:8px}
  .cover.has .empty{display:none}
  .cover:hover{border-color:#8a8f9c}
  .hint{font-size:19px;color:#a6a8ae;line-height:1.5}
  .row{display:flex;gap:8px;align-items:center}
  /* gate */
  #gate{position:fixed;inset:0;z-index:100;background:#0f0f11;display:flex;align-items:center;justify-content:center;padding:24px}
  #gate .card{width:min(400px,100%);background:#17181c;border:1px solid #2a2c33;border-radius:14px;padding:24px;text-align:center}
  #gate input{width:100%;box-sizing:border-box;background:#0a0b0e;border:1px solid #484d59;color:#eceae4;border-radius:10px;padding:12px 14px;font-size:16px}
  #gate .go{width:100%;margin-top:10px;background:#e85c4a;border:0;color:#fff;font-weight:700;border-radius:10px;padding:12px;font-size:16px;cursor:pointer}
  #gate .err{color:#e85c4a;font-size:13px;min-height:18px;margin:8px 0 4px}
  /* image picker */
  #picker{position:fixed;inset:0;z-index:34;background:#0f0f11;display:none;align-items:center;justify-content:center;padding:16px}
  #picker.open{display:flex}
  #picker .sheet{width:min(920px,100%);max-height:88vh;background:#17181c;border:1px solid #2a2c33;border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
  #picker .shd{display:flex;align-items:center;gap:10px;padding:15px 16px;border-bottom:1px solid #2a2c33}
  #picker .shd b{flex:1;font-size:22px;font-weight:700}
  #picker .grid{padding:14px;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  #picker .tile{position:relative;height:0;padding-bottom:100%;background:#000;border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent}
  #picker .tile:hover{border-color:#e85c4a}
  #picker .tile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
  #toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,12px);z-index:40;background:#3fb56b;color:#08130c;font-weight:700;
         padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  /* slide list (생성 + 순서 변경 + 편집 이동) */
  #listwrap{position:fixed;inset:0;z-index:32;background:#0f0f11;display:none;align-items:center;justify-content:center;padding:16px}
  #listwrap.open{display:flex}
  #listwrap .sheet{width:min(620px,100%);max-height:90vh;background:#17181c;border:1px solid #2a2c33;border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
  #listwrap .shd{display:flex;align-items:center;gap:8px;padding:15px 16px;border-bottom:1px solid #2a2c33}
  #listwrap .shd b{flex:1;font-size:22px;font-weight:700}
  #listwrap .list{padding:10px;overflow:auto;display:flex;flex-direction:column;gap:8px}
  .lrow{display:flex;align-items:center;gap:12px;background:#0a0b0e;border:1px solid #2a2c33;border-radius:10px;padding:10px 12px}
  .lrow .ord{min-width:36px;height:36px;padding:0 9px;display:inline-flex;align-items:center;justify-content:center;background:#e85c4a;color:#fff;font-weight:700;border-radius:8px;font-size:19px;flex:none}
  .lrow .th{width:76px;height:54px;object-fit:cover;border-radius:6px;background:#000;flex:none}
  .lrow .tt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:10px 0;font-size:20px}
  .lrow .mv{display:flex;flex-direction:column;gap:4px;flex:none}
  .lrow .mv button{width:48px;height:32px;padding:0;font-size:16px}
  .lrow .mv button:disabled{opacity:.3;cursor:default}
  /* full admin overlay (기존 admin 전체를 내장) */
  #adminwrap{position:fixed;inset:0;z-index:50;background:#0f0f11;display:none;flex-direction:column}
  #adminwrap.open{display:flex}
  #adminwrap .ovbar{height:48px;flex:none;display:flex;align-items:center;gap:10px;padding:0 12px;background:#141519;border-bottom:1px solid #2a2c33}
  #adminwrap .ovbar b{flex:1;font-size:13px}
  #adminframe{flex:1;border:0;width:100%;background:#0f0f11}
  /* 저장 FAB — 편집 중 항상 보이는 저장(바가 잘려도 접근 가능). 패널 위(z9)·오버레이 아래 */
  #saveFab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom,0px));z-index:20;display:none;align-items:center;gap:8px;
           background:#3fb56b;color:#08130c;font-weight:800;border:0;border-radius:999px;padding:16px 26px;font-size:20px;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.45)}
  #saveFab.show{display:inline-flex}
  @media (max-width:560px){
    #panel,#apanel{width:100%;top:auto;height:86%;border-left:0;border-top:1px solid #2a2c33;border-radius:16px 16px 0 0;transform:translateY(102%)}
    #panel.open,#apanel.open{transform:none}
    #bar b{display:none}
    /* 픽커·목록은 모바일에서 전체 화면 → 뒤 패널과 절대 겹치지 않음 */
    #picker,#listwrap{padding:0}
    #picker .sheet,#listwrap .sheet{width:100vw;max-width:100vw;height:100dvh;max-height:100dvh;border:0;border-radius:0}
  }
</style>
</head>
<body>
<div id="bar">
  <b>ADMIN2 <span>· 인컨텍스트 편집</span></b>
  <button class="btn" id="editToggle" type="button">편집 꺼짐</button>
  <button class="btn" id="openList" type="button" style="display:none">작품 목록</button>
  <button class="btn" id="openAdmin" type="button">전체 관리자</button>
  <button class="btn" id="hardReload" type="button" title="최신 버전으로 강제 새로고침">↻</button>
  <span id="status">불러오는 중…</span>
</div>
<iframe id="frame" src="/" title="site"></iframe>

<div id="panel" aria-hidden="true">
  <div class="phead">
    <h2>작품 편집 <span id="p-sub"></span></h2>
    <button class="btn sm" id="panelClose" type="button" title="편집 닫기">✕ 닫기</button>
  </div>
  <div class="pbody">
    <div class="field"><label>대표 이미지 (눌러서 선택/변경)</label>
      <div class="cover" id="f-cover"><img id="f-cover-img"><span class="empty">＋ 이미지 적용</span></div></div>
    <div class="field"><label>날짜 (타임라인 연·월)</label>
      <div class="datesel"><select id="f-year"></select><select id="f-mon"></select></div></div>
    <div class="field"><label>상세 제목 (클릭 시 제목)</label><input id="f-title" placeholder="작품 제목"></div>
    <div class="field"><label>가격 (입력하면 상세에 노출, 비우면 숨김)</label><input id="f-price" placeholder="예: 3,000,000원 · 문의"></div>
    <div class="field"><label>상세 설명</label><textarea id="f-desc" placeholder="작품 설명…"></textarea></div>
    <div class="field"><label>상세 본문 (설명 위/아래에 들어가는 이미지·영상·설명)</label>
      <div class="row" style="flex-wrap:wrap;gap:6px">
        <button class="btn sm addb" data-madd="image" type="button">+이미지</button>
        <button class="btn sm addb" data-madd="video" type="button">+영상</button>
        <button class="btn sm addb" data-madd="text" type="button">+설명</button>
      </div>
      <div id="mediaList" style="display:flex;flex-direction:column;gap:10px;margin-top:8px"></div>
    </div>
    <div class="row" style="margin-top:2px">
      <button class="btn danger sm" id="delSlide" type="button">이 작품 삭제</button>
    </div>
  </div>
</div>

<div id="apanel" aria-hidden="true">
  <div class="phead"><h2>소개(About) 편집</h2><button class="btn sm" id="aClose" type="button" title="편집 닫기">✕ 닫기</button></div>
  <div class="pbody">
    <div class="row" style="flex-wrap:wrap;gap:6px">
      <button class="btn sm addb" data-add="title" type="button">+제목</button>
      <button class="btn sm addb" data-add="text" type="button">+본문</button>
      <button class="btn sm addb" data-add="image" type="button">+이미지</button>
      <button class="btn sm addb" data-add="video" type="button">+영상</button>
      <button class="btn sm addb" data-add="list" type="button">+리스트</button>
      <button class="btn sm addb" data-add="thanks" type="button">+감사</button>
    </div>
    <div id="ablocks" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>
</div>

<div id="picker"><div class="sheet">
  <div class="shd"><b>대표 이미지 선택</b><button class="btn sm" id="pickClose" type="button">닫기</button></div>
  <div class="grid" id="pickGrid"></div>
</div></div>

<div id="listwrap"><div class="sheet">
  <div class="shd"><b>작품 목록 · 순서 변경</b>
    <button class="btn sm primary" id="listAdd" type="button">+ 슬라이드</button>
    <button class="btn sm" id="listClose" type="button">닫기</button></div>
  <div class="list" id="listBody"></div>
</div></div>

<div id="adminwrap"><div class="ovbar"><b>전체 관리자 · 기존 admin의 모든 기능</b><button class="btn sm" id="adminClose" type="button">✕ 닫기</button></div><iframe id="adminframe" title="admin"></iframe></div>

<button id="saveFab" type="button">저장하기</button>
<div id="toast">저장되었습니다</div>
<script>
(function(){
  const $=s=>document.querySelector(s);
  const KEY='lse_admin_key';
  const getKey=()=>localStorage.getItem(KEY)||'';
  const orig=window.fetch.bind(window);
  const api=(url,opts)=>{ opts=Object.assign({},opts); if(String(url).indexOf('/api/')!==-1){ const h=new Headers(opts.headers||{}); const k=getKey(); if(k)h.set('X-Admin-Key',k); opts.headers=h;} return orig(url,opts); };
  async function verify(k){ try{ const r=await orig('/api/auth',{headers:{'X-Admin-Key':k}}); return r.status===200?'ok':(r.status===403?'bad':'unknown'); }catch(e){ return 'unknown'; } }

  let content=null, baseVersion=null, images=[], editMode=false, curId=null, pinned=false, dirty=false, nid=0, dismissedId=null, aboutOpen=false, aboutDismissed=false;
  const setStatus=(m,c='')=>{ const e=$('#status'); e.textContent=m; e.className=c; };
  const slides=()=>((content&&content.slides)||[]);
  const findSlide=id=>slides().find(s=>String(s.id)===String(id));
  const markDirty=()=>{ dirty=true; $('#saveFab').classList.add('show'); setStatus('저장되지 않은 변경 있음','err'); };
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  /* ---- login gate ---- */
  function showGate(msg){
    let g=document.getElementById('gate');
    if(!g){
      g=document.createElement('div'); g.id='gate';
      g.innerHTML='<div class="card"><div style="font-size:20px;font-weight:700;margin-bottom:6px">admin2 로그인</div>'
        +'<div style="font-size:14px;color:#8a8c94;margin-bottom:16px">관리자 비밀번호를 입력하세요.</div>'
        +'<input id="g-pw" type="password" autocomplete="current-password" placeholder="관리자 비밀번호">'
        +'<div class="err" id="g-err"></div><button class="go" id="g-go">확인</button></div>';
      document.body.appendChild(g);
      const pw=g.querySelector('#g-pw'), go=g.querySelector('#g-go'), err=g.querySelector('#g-err');
      const submit=async()=>{ const v=(pw.value||'').trim(); if(!v){ err.textContent='비밀번호를 입력하세요.'; return; }
        go.disabled=true; err.textContent='확인 중…'; const res=await verify(v);
        if(res==='bad'){ err.textContent='비밀번호가 일치하지 않습니다.'; go.disabled=false; pw.value=''; pw.focus(); return; }
        localStorage.setItem(KEY,v); g.remove(); boot(); };
      go.onclick=submit; pw.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); submit(); } });
      setTimeout(()=>pw.focus(),60);
    }
    if(msg) g.querySelector('#g-err').textContent=msg;
  }

  async function loadAll(){
    const [c,im]=await Promise.all([
      orig('/api/content?t='+Date.now()).then(r=>r.json()),
      orig('/api/images?t='+Date.now()).then(r=>r.json()).catch(()=>({images:[]})),
    ]);
    content=c; baseVersion=content._version||null; delete content._version; images=im.images||[];
  }

  /* ---- 현재 프론트 라우트 ---- */
  function currentPath(){ try{ return $('#frame').contentWindow.location.pathname||''; }catch(e){ return ''; } }
  function pIdOf(p){ const i=p.indexOf('/p/'); return i>=0 ? decodeURIComponent(p.slice(i+3)) : null; }

  function fillPanel(s){
    $('#p-sub').textContent = s.id ? ('#'+s.id) : '';
    const cover=$('#f-cover'); $('#f-cover-img').src=s.image||''; cover.classList.toggle('has',!!(s.image||'').trim());
    const dm=/(\d{4})-(\d{2})/.exec(s.date||''); $('#f-year').value=dm?dm[1]:''; $('#f-mon').value=dm?dm[2]:'';
    $('#f-title').value=s.title||''; $('#f-price').value=s.price||''; $('#f-desc').value=s.desc||'';
    renderMedia();
  }
  function openPanel(){ $('#panel').classList.add('open'); $('#panel').setAttribute('aria-hidden','false'); }
  function closePanel(){ $('#panel').classList.remove('open'); $('#panel').setAttribute('aria-hidden','true'); pinned=false; curId=null; }
  function userClose(){ dismissedId=pIdOf(currentPath())||curId; closePanel(); }   // 사용자가 닫은 작품은 같은 작품에선 다시 안 열림

  function setTarget(id){ curId=id; const s=findSlide(id); if(s){ fillPanel(s); openPanel(); setStatus('편집 중: '+(s.title||('#'+id)),''); } }

  function refreshTarget(){
    if(!editMode){ closePanel(); closeAbout(); dismissedId=null; aboutDismissed=false; return; }
    if(pinned) return;                          // 목록/생성으로 고정된 슬라이드 편집 중 — 라우트 무시
    const p=currentPath(), isAbout=/\/about\/?$/.test(p);
    if(isAbout){                                // 소개 페이지 위 → About 편집 패널
      if(curId) closePanel(); dismissedId=null;
      if(!aboutOpen && !aboutDismissed) openAbout();
      return;
    }
    if(aboutOpen) closeAbout(); aboutDismissed=false;
    const id=pIdOf(p);
    if(id!==dismissedId) dismissedId=null;      // 다른 작품/목록으로 이동하면 닫힘 상태 해제
    if(id===curId) return;                      // 이미 그 작품을 보고 있음
    if(id && id!==dismissedId && findSlide(id)) setTarget(id);
    else if(!id && $('#panel').classList.contains('open')) closePanel();
  }

  /* ---- fields ---- */
  function bindField(sel,key){ $(sel).addEventListener('input',e=>{ const s=findSlide(curId); if(!s)return; s[key]=e.target.value; markDirty(); }); }
  function populateDateSelects(){
    const ys=$('#f-year'), ms=$('#f-mon'); if(!ys||!ms) return;
    const now=new Date().getFullYear();
    let yo='<option value="">연도</option>'; for(let y=now+3;y>=1980;y--) yo+='<option value="'+y+'">'+y+'년</option>'; ys.innerHTML=yo;
    let mo='<option value="">월</option>'; for(let m=1;m<=12;m++){ const mm=String(m).padStart(2,'0'); mo+='<option value="'+mm+'">'+m+'월</option>'; } ms.innerHTML=mo;
  }
  function onDateChange(){ const s=findSlide(curId); if(!s) return; const y=$('#f-year').value, m=$('#f-mon').value; s.date = y ? (y+'-'+(m||'01')+'-01') : ''; markDirty(); }
  $('#f-year').addEventListener('change',onDateChange); $('#f-mon').addEventListener('change',onDateChange);

  /* ---- 이미지 픽커 (onPick 콜백으로 대상 지정) ---- */
  let pickCb=null;
  function openPicker(onPick){
    pickCb=onPick||null;
    const g=$('#pickGrid'); g.innerHTML='';
    images.forEach(name=>{ const t=document.createElement('div'); t.className='tile'; t.innerHTML='<img loading="lazy" src="/images/'+esc(name)+'">';
      t.onclick=()=>{ if(pickCb) pickCb(name); $('#picker').classList.remove('open'); };
      g.appendChild(t); });
    $('#picker').classList.add('open');
  }
  $('#f-cover').onclick=()=>{ if(curId) openPicker(name=>{ const s=findSlide(curId); if(s){ s.image='/images/'+name; fillPanel(s); markDirty(); } }); };
  $('#pickClose').onclick=()=>$('#picker').classList.remove('open');
  $('#picker').addEventListener('click',e=>{ if(e.target.id==='picker') $('#picker').classList.remove('open'); });

  /* ---- 슬라이드 추가 (최상단, 날짜=최신+1개월) ---- */
  function addSlide(){
    let maxY=0,maxM=0;
    slides().forEach(s=>{ const m=/(\d{4})-(\d{2})/.exec(String(s.date||'')); if(m){const y=+m[1],mo=+m[2]; if(y>maxY||(y===maxY&&mo>maxM)){maxY=y;maxM=mo;} } });
    let ym; if(maxY){ let ny=maxY,nm=maxM+1; if(nm>12){nm=1;ny++;} ym=ny+'-'+String(nm).padStart(2,'0')+'-01'; }
    else { const n=new Date(); ym=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-01'; }
    const s={id:'n'+Date.now()+'_'+(nid++),image:'',bottom:'Inspire',date:ym};
    slides().unshift(s);
    pinned=true; setTarget(s.id); markDirty();
    setStatus('새 작품 — 이미지·제목을 넣고 저장하세요','');
  }

  /* ---- 작품 목록 (생성 + 순서 변경 + 탭하면 편집) ---- */
  function renderList(){
    const b=$('#listBody'); b.innerHTML=''; const arr=slides();
    if(!arr.length){ b.innerHTML='<div class="hint" style="padding:14px">아직 작품이 없습니다. + 슬라이드로 추가하세요.</div>'; return; }
    arr.forEach((s,i)=>{
      const row=document.createElement('div'); row.className='lrow';
      row.innerHTML='<span class="ord">'+(i+1)+'</span>'
        +(s.image?'<img class="th" src="'+esc(s.image)+'">':'<span class="th"></span>')
        +'<span class="tt">'+(s.title?esc(s.title):'<i style="color:#8a8c94">제목 없음</i>')+'</span>'
        +'<span class="mv"><button class="btn sm" data-up type="button" title="위로">▲</button>'
        +'<button class="btn sm" data-dn type="button" title="아래로">▼</button></span>';
      row.querySelector('.tt').onclick=()=>{ pinned=true; dismissedId=null; setTarget(s.id); $('#listwrap').classList.remove('open'); };
      const up=row.querySelector('[data-up]'), dn=row.querySelector('[data-dn]');
      if(i===0) up.disabled=true; if(i===arr.length-1) dn.disabled=true;
      up.onclick=()=>{ arr.splice(i-1,0,arr.splice(i,1)[0]); markDirty(); renderList(); };
      dn.onclick=()=>{ arr.splice(i+1,0,arr.splice(i,1)[0]); markDirty(); renderList(); };
      b.appendChild(row);
    });
  }
  function openList(){ renderList(); $('#listwrap').classList.add('open'); }

  /* ---- 소개(About) 인컨텍스트 편집 ---- */
  const G3=['sm','md','lg'];
  const ABOUT_FIELDS={
    title:[{k:'text',t:'ta',label:'제목 텍스트'},{k:'align',t:'sel',opts:['left','center','right'],label:'정렬'},{k:'size',t:'sel',opts:G3,label:'크기'},{k:'gap',t:'sel',opts:G3,label:'위 간격'}],
    text:[{k:'text',t:'ta',label:'본문'},{k:'size',t:'sel',opts:G3,label:'크기'},{k:'gap',t:'sel',opts:G3,label:'위 간격'}],
    thanks:[{k:'text',t:'ta',label:'감사 문구'}],
    image:[{k:'src',t:'img',label:'이미지'},{k:'caption',t:'in',label:'캡션'},{k:'size',t:'sel',opts:['full','half','100','90','80','75','70','60','50','40','33','25'],label:'크기(%/full/half)'},{k:'align',t:'sel',opts:['left','center','right'],label:'정렬'},{k:'gap',t:'sel',opts:G3,label:'위 간격'}],
    video:[{k:'videoId',t:'in',label:'유튜브 ID 또는 URL'},{k:'size',t:'sel',opts:['full','half','100','90','80','75','70','60','50'],label:'크기'},{k:'gap',t:'sel',opts:G3,label:'위 간격'}],
    list:[{k:'label',t:'in',label:'제목(한글)'},{k:'labelEn',t:'in',label:'제목(영문)'},{k:'sizeLabel',t:'sel',opts:G3,label:'제목 크기'},{k:'sizeText',t:'sel',opts:G3,label:'항목 크기'},{k:'gap',t:'sel',opts:G3,label:'위 간격'},{k:'items',t:'items',label:'항목'}],
  };
  const ABLABEL={title:'제목',text:'본문',thanks:'감사',image:'이미지',video:'영상',list:'리스트'};
  function aboutArr(){ if(!content) return []; content.blocks=content.blocks||{}; content.blocks['/about']=content.blocks['/about']||[]; return content.blocks['/about']; }

  function itemsEditor(blk){
    const box=document.createElement('div'); const lab=document.createElement('label'); lab.textContent='항목'; box.appendChild(lab);
    blk.items=blk.items||[];
    blk.items.forEach((it,idx)=>{
      const r=document.createElement('div'); r.className='aitem';
      const fields=document.createElement('div'); fields.className='fields';
      [['text','내용'],['textEn','영문 (선택)'],['date','날짜 (선택)']].forEach(pair=>{
        const k=pair[0]; const inp=document.createElement('input'); inp.placeholder=pair[1]; inp.value=it[k]!=null?it[k]:'';
        inp.oninput=()=>{ const v=inp.value; if(v==='') delete it[k]; else it[k]=v; markDirty(); };
        fields.appendChild(inp);
      });
      const rm=document.createElement('button'); rm.type='button'; rm.className='btn sm rm'; rm.textContent='✕';
      rm.onclick=()=>{ blk.items.splice(idx,1); markDirty(); renderAbout(); };
      r.appendChild(fields); r.appendChild(rm); box.appendChild(r);
    });
    const add=document.createElement('button'); add.type='button'; add.className='btn sm'; add.style.marginTop='8px'; add.textContent='+ 항목 추가';
    add.onclick=()=>{ blk.items.unshift({text:''}); markDirty(); renderAbout(); };
    box.appendChild(add); return box;
  }

  function fieldCtrl(blk,f,rerender){
    const wrap=document.createElement('div'); wrap.className='af';
    if(f.t==='img'){
      const l=document.createElement('label'); l.textContent=f.label; wrap.appendChild(l);
      const c=document.createElement('div'); c.className='acover';
      if(blk.src){ const im=document.createElement('img'); im.src=blk.src; c.appendChild(im); } else c.textContent='＋ 이미지 선택';
      c.onclick=()=>openPicker(name=>{ blk.src='/images/'+name; markDirty(); rerender&&rerender(); });
      wrap.appendChild(c); return wrap;
    }
    if(f.t==='items') return itemsEditor(blk);
    const l=document.createElement('label'); l.textContent=f.label; wrap.appendChild(l);
    if(f.t==='pos'){
      const e=document.createElement('select');
      [['0','위 (설명 앞)'],['','아래 (설명 뒤)']].forEach(o=>{ const op=document.createElement('option'); op.value=o[0]; op.textContent=o[1]; if(((blk.pos==='0'||blk.pos===0)?'0':'')===o[0]) op.selected=true; e.appendChild(op); });
      e.onchange=()=>{ if(e.value==='0') blk.pos='0'; else delete blk.pos; markDirty(); }; wrap.appendChild(e);
    } else if(f.t==='sel'){
      const e=document.createElement('select');
      f.opts.forEach(o=>{ const op=document.createElement('option'); op.value=o; op.textContent=o; if(String(blk[f.k]==null?f.opts[0]:blk[f.k])===o) op.selected=true; e.appendChild(op); });
      e.onchange=()=>{ blk[f.k]=e.value; markDirty(); }; wrap.appendChild(e);
    } else {
      const e=document.createElement(f.t==='ta'?'textarea':'input'); e.value=blk[f.k]!=null?blk[f.k]:'';
      e.oninput=()=>{ blk[f.k]=e.value; markDirty(); }; wrap.appendChild(e);
    }
    return wrap;
  }

  function abtn(t){ const b=document.createElement('button'); b.type='button'; b.className='btn sm'; b.textContent=t; return b; }
  function blockCard(arr,i,label,fields,rerender){
    const card=document.createElement('div'); card.className='ablk';
    const h=document.createElement('div'); h.className='ablk__h';
    const tag=document.createElement('span'); tag.className='btag'; tag.textContent=label;
    const sp=document.createElement('span'); sp.className='sp';
    const up=abtn('▲'),dn=abtn('▼'),del=abtn('삭제'); del.className='btn sm del';
    if(i===0) up.disabled=true; if(i===arr.length-1) dn.disabled=true;
    up.onclick=()=>{ arr.splice(i-1,0,arr.splice(i,1)[0]); markDirty(); rerender(); };
    dn.onclick=()=>{ arr.splice(i+1,0,arr.splice(i,1)[0]); markDirty(); rerender(); };
    del.onclick=()=>{ if(confirm('이 블록을 삭제할까요?')){ arr.splice(i,1); markDirty(); rerender(); } };
    h.appendChild(tag); h.appendChild(sp); h.appendChild(up); h.appendChild(dn); h.appendChild(del);
    const body=document.createElement('div'); body.className='ablk__b';
    const blk=arr[i]; fields.forEach(f=>body.appendChild(fieldCtrl(blk,f,rerender)));
    card.appendChild(h); card.appendChild(body); return card;
  }
  function renderAbout(){
    const host=$('#ablocks'); if(!host) return; host.innerHTML=''; const arr=aboutArr();
    if(!arr.length){ host.innerHTML='<div class="hint">블록이 없습니다. 위 버튼으로 추가하세요.</div>'; return; }
    arr.forEach((blk,i)=>host.appendChild(blockCard(arr,i,ABLABEL[blk.type]||blk.type,ABOUT_FIELDS[blk.type]||[],renderAbout)));
  }

  /* ---- 상세 본문(media) 인컨텍스트 편집 ---- */
  const MEDIA_FIELDS={
    image:[{k:'src',t:'img',label:'이미지'},{k:'caption',t:'in',label:'캡션'},{k:'size',t:'sel',opts:['full','half','100','90','80','75','70','60','50','40','33','25'],label:'크기'},{k:'align',t:'sel',opts:['left','center','right'],label:'정렬'},{k:'pos',t:'pos',label:'위치'}],
    video:[{k:'videoId',t:'in',label:'유튜브 ID 또는 URL'},{k:'caption',t:'in',label:'캡션'},{k:'size',t:'sel',opts:['full','half','100','90','80','75','70','60','50'],label:'크기'},{k:'align',t:'sel',opts:['left','center','right'],label:'정렬'},{k:'pos',t:'pos',label:'위치'}],
    text:[{k:'text',t:'ta',label:'설명 텍스트'},{k:'pos',t:'pos',label:'위치'}],
  };
  const MLABEL={image:'이미지',video:'영상',text:'설명'};
  function renderMedia(){
    const host=$('#mediaList'); if(!host) return; host.innerHTML='';
    const s=findSlide(curId); if(!s) return;
    const arr=s.media||[];
    if(!arr.length){ host.innerHTML='<div class="hint">상세 본문 요소가 없습니다. 위 버튼으로 추가하세요.</div>'; return; }
    arr.forEach((blk,i)=>host.appendChild(blockCard(arr,i,MLABEL[blk.type]||blk.type,MEDIA_FIELDS[blk.type]||[],renderMedia)));
  }
  function addMedia(type){
    const s=findSlide(curId); if(!s) return; s.media=s.media||[];
    const D={ image:{type:'image',src:'',caption:'',size:'full',align:'center'},
      video:{type:'video',videoId:'',caption:'',size:'full',align:'center'},
      text:{type:'text',text:'',pos:'0'} };
    if(!D[type]) return; s.media.unshift(Object.assign({},D[type])); markDirty(); renderMedia();
  }
  function addAbout(type){
    const D={ title:{type:'title',text:'제목',size:'md',align:'left',gap:'md'},
      text:{type:'text',text:'',size:'sm',gap:'sm'},
      thanks:{type:'thanks',text:''},
      image:{type:'image',src:'',caption:'',size:'full',gap:'sm'},
      video:{type:'video',videoId:'',size:'full',gap:'sm'},
      list:{type:'list',label:'',labelEn:'',items:[],sizeLabel:'lg',sizeText:'sm',gap:'md'} };
    if(!D[type]) return;
    aboutArr().push(Object.assign({},D[type])); markDirty(); renderAbout();
    const ap=$('#apanel'); ap.scrollTop=ap.scrollHeight;
  }
  function openAbout(){ aboutOpen=true; renderAbout(); $('#apanel').classList.add('open'); $('#apanel').setAttribute('aria-hidden','false'); setStatus('소개(About) 편집 중',''); }
  function closeAbout(){ aboutOpen=false; $('#apanel').classList.remove('open'); $('#apanel').setAttribute('aria-hidden','true'); }
  function aboutUserClose(){ aboutDismissed=true; closeAbout(); }

  /* ---- 삭제 (비밀번호 확인) ---- */
  function delSlide(){
    const s=findSlide(curId); if(!s) return;
    if(!confirm('이 작품을 삭제할까요? ('+(s.title||('#'+curId))+')')) return;
    const v=prompt('삭제하려면 관리자 비밀번호를 입력하세요'); if(v===null) return;
    if(v.trim()!==getKey()){ alert('비밀번호가 일치하지 않아 취소했습니다.'); return; }
    const i=slides().findIndex(x=>String(x.id)===String(curId)); if(i>=0) slides().splice(i,1);
    closePanel(); markDirty(); setStatus('삭제됨 — 저장하면 반영','ok');
  }

  async function save(){
    if(!dirty) return;
    setStatus('저장 중…','');
    try{
      const payload=Object.assign({},content,{_version:baseVersion});
      const r=await api('/api/content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(r=>r.json());
      if(r.error){ setStatus('저장 실패: '+r.error,'err'); return; }
      baseVersion=r.version||null; dirty=false; $('#saveFab').classList.remove('show');
      setStatus('저장됨 · 공개 반영은 배포 뒤(~30초)','ok');
      const t=$('#toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1600);
    }catch(e){ setStatus('저장 실패: '+e.message,'err'); }
  }

  /* ---- 전체 관리자 오버레이 (기존 admin 전체 기능; 같은 오리진 iframe, 저장 키 공유로 재로그인 없음) ---- */
  function openAdmin(){
    const go=()=>{ $('#adminframe').src='/admin/index.html?_='+Date.now(); $('#adminwrap').classList.add('open'); };
    if(dirty){ if(confirm('저장되지 않은 변경이 있습니다. 저장하고 전체 관리자를 열까요?\n(취소=저장하지 않고 열기)')){ save().then(go); return; } }
    go();
  }
  function closeAdmin(){
    $('#adminwrap').classList.remove('open'); $('#adminframe').src='about:blank';
    // 전체 관리자에서 바꾼 내용이 인라인 패널과 어긋나지 않게 최신 콘텐츠로 다시 불러온다
    loadAll().then(()=>{ dirty=false; $('#saveFab').classList.remove('show'); setStatus(slides().length+'개 작품 · 최신 상태','ok'); refreshTarget(); })
             .catch(e=>setStatus('갱신 실패: '+e.message,'err'));
  }

  function setEdit(on){
    editMode=on;
    $('#editToggle').textContent=on?'편집 켜짐':'편집 꺼짐'; $('#editToggle').classList.toggle('on',on);
    $('#openList').style.display=on?'':'none';
    if(!on){ closePanel(); closeAbout(); $('#listwrap').classList.remove('open'); } else refreshTarget();
    if(on) setStatus('편집 켜짐 — 작품을 열거나 + 슬라이드','');
  }

  function boot(){
    // 핸들러는 콘텐츠 로드 성공 여부와 무관하게 먼저 배선한다 (로드 실패가 UI 전체를 죽이지 않도록)
    bindField('#f-title','title'); bindField('#f-price','price'); bindField('#f-desc','desc');
    populateDateSelects();
    $('#saveFab').onclick=save;
    $('#editToggle').onclick=()=>setEdit(!editMode);
    $('#openList').onclick=openList;
    $('#listAdd').onclick=()=>{ addSlide(); $('#listwrap').classList.remove('open'); };
    $('#listClose').onclick=()=>$('#listwrap').classList.remove('open');
    $('#listwrap').addEventListener('click',e=>{ if(e.target.id==='listwrap') $('#listwrap').classList.remove('open'); });
    $('#panelClose').onclick=userClose;
    $('#delSlide').onclick=delSlide;
    $('#aClose').onclick=aboutUserClose;
    document.querySelectorAll('#apanel .addb').forEach(b=>{ b.onclick=()=>addAbout(b.getAttribute('data-add')); });
    document.querySelectorAll('#panel [data-madd]').forEach(b=>{ b.onclick=()=>addMedia(b.getAttribute('data-madd')); });
    $('#openAdmin').onclick=openAdmin;
    $('#adminClose').onclick=closeAdmin;
    $('#hardReload').onclick=()=>{ if(dirty && !confirm('저장되지 않은 변경이 있습니다. 새로고침하면 사라집니다. 계속할까요?')) return; location.replace(location.pathname+'?_='+Date.now()); };
    setInterval(refreshTarget,500);
    loadAll().then(()=>{ setStatus(slides().length+'개 작품 · 편집을 켜세요',''); })
             .catch(e=>setStatus('콘텐츠 불러오기 실패: '+e.message+' · 전체 관리자는 사용 가능','err'));
  }

  (async()=>{
    const k=getKey();
    if(!k){ showGate(); return; }
    const res=await verify(k);
    if(res==='bad'){ localStorage.removeItem(KEY); showGate('저장된 비밀번호가 더 이상 유효하지 않습니다. 다시 입력하세요.'); return; }
    boot();
  })();
})();
</script>
</body>
</html>
