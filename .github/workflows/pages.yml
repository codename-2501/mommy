name: Deploy to GitHub Pages

# The live site now serves from Vercel (lsegallery.art), which auto-deploys on push and runs the admin's
# serverless functions Pages cannot. This workflow is kept as a manual fallback only — it no longer runs on
# every push, so a commit does not trigger a second, orphaned build.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pillow
      # served from the custom domain lsegallery.art at the ROOT, so build with an empty base — assets stay
      # root-relative (/site/...). (A /<repo>/ base is only right for the github.io/<repo>/ URL, which now
      # just 301-redirects to the custom domain, so it is not served directly.)
      - run: python build_static.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
